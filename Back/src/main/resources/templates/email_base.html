<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin: 0; padding: 0; background-color: #121212; color: #e0e0e0; font-family: sans-serif;">
<div style="padding: 20px;">
    <h1 th:text="${titulo}" th:style="'color: ' + ${color}">Título Friki</h1>
    <p th:text="${intro}" style="font-size: 18px;">Introducción de la misión...</p>

    <div th:each="oferta : ${ofertas}"
         th:style="'background-color: #2a2a2a; padding: 15px; border-left: 5px solid ' + ${color} + '; margin: 10px 0;'">

        <div style="float: left; width: 70%;">
            <span th:text="${oferta.nombre}" style="font-size: 18px; color: #ffffff; font-weight: bold;">Nombre del Item</span><br/>
            <span th:text="'Categoría: ' + ${oferta.tipo}" style="font-size: 14px; color: #888;">Categoría</span><br/>
            <span th:text="${#numbers.formatDecimal(oferta.precio, 1, 2)} + '€'" style="font-size: 22px; color: #00ff00; font-weight: bold;">0.00€</span>
        </div>

        <div style="float: right; width: 25%; text-align: right;">
            <a th:href="@{${urlBase} + '/' + ${oferta.tipo.toLowerCase()} + '/' + ${oferta.idItem}}"
               th:style="'background-color: ' + ${color} + '; color: white; text-decoration: none; padding: 8px 12px; border-radius: 5px;'">
                VER BOTÍN
            </a>
        </div>
        <div style="clear: both;"></div>
    </div>

    <p th:text="${cierre}" style="font-style: italic; color: #bbb; margin-top: 20px;">Cierre...</p>
    <footer th:text="${footer}" style="border-top: 1px solid #333; padding-top: 10px; font-size: 12px; color: #666;">
        Pie de página
    </footer>
</div>
</body>
</html>
