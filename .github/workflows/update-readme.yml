name: Update README Date

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_ADMIN }}

      - name: Find last bot update to README in main
        id: last_bot_commit
        run: |
          LAST_BOT_COMMIT=$(git log --all -n 1 --pretty=format:"%H" --author="QuestHub Bot" -- README.md || true)
          echo "last_bot_commit=$LAST_BOT_COMMIT" >> $GITHUB_OUTPUT

      - name: Get last human commit date
        id: human_commit
        run: |
          BOT=${{ steps.last_bot_commit.outputs.last_bot_commit }}

          if [[ -z "$BOT" ]]; then
            RANGE="--all"
          else
            RANGE="$BOT..HEAD --all"
          fi

          HUMAN_COMMIT=$(git log $RANGE --pretty=format:"%H|%an" | grep -v "QuestHub Bot" | head -n 1 || true)

          if [[ -z "$HUMAN_COMMIT" ]]; then
            echo "changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMIT_HASH=$(echo "$HUMAN_COMMIT" | cut -d "|" -f1)
          DATE=$(git log -n 1 --pretty=format:"%cs" $COMMIT_HASH)

          echo "changes=true" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Update README date
        if: steps.human_commit.outputs.changes == 'true'
        run: |
          DATE=${{ steps.human_commit.outputs.date }}

          sed -i "s|^Última actualización:.*|Última actualización: $DATE|" README.md

      - name: Commit changes
        if: steps.human_commit.outputs.changes == 'true'
        run: |
          git config user.name "QuestHub Bot"
          git config user.email "bot@questhub.local"

          if git diff --quiet README.md; then
            echo "No hay cambios en README."
            exit 0
          fi

          git add README.md
          git commit -m "Update README date"
          git pull --rebase origin main
          git push origin main
